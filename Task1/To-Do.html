<!-- // 1. **Interactive To-Do List Application**
//     - **Objective:** Create a simple to-do list app where users can add new tasks, mark them as complete, and remove them.
//     - **Requirements:**
//         - Use DOM manipulation to create, update, and delete list items.
//         - Attach event listeners for adding tasks and toggling their completion status.
//         - Optionally store tasks in an array (or even in `localStorage` for persistence). -->
<!DOCTYPE html>
<html>
<head>
    <title>To-Do List App</title>

    <style>
        body{
            font-family: Arial;
            background: #373737;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .container{
            background: white;
            padding: 20px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgb(0, 0, 0);
        }

        h2{
            text-align: center;
        }

        input{
            width: 70%;
            padding: 10px;
        }

        button{
            padding: 10px;
            cursor: pointer;
        }

        ul{
            list-style: none;
            padding: 0;
        }

        li{
            background: #eee;
            margin-top: 10px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 5px;
        }
         
        .completed{
            background-color:rgb(211, 188, 34);
            color: white;
            border: none;
            padding: 5px 8px;

        }

        li.completed{
            text-decoration: line-through;
            color: gray;
            background: #d3ffd3;
        }
       

        .delete{
            background: red;
            color: white;
            border: none;
            padding: 5px 8px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>To-Do List</h2>

    <input type="text" id="taskInput" placeholder="Enter task...">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    //even after refresh it will remember the tasks


    function saveTasks(){
        localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function renderTasks(){
        const list = document.getElementById("taskList");
        list.innerHTML = "";

        tasks.forEach((task, index) => {

            const li = document.createElement("li");

            const span = document.createElement("span");
            span.textContent = task.text;

            if(task.completed){
                li.classList.add("completed");
            }

            const tickBtn = document.createElement("button");
            tickBtn.textContent = "✓";
            
            

            tickBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                tasks[index].completed = !tasks[index].completed;
                saveTasks();
                renderTasks();
            });

            const delBtn = document.createElement("button");
            delBtn.textContent = "X";

            delBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                tasks.splice(index, 1);
                saveTasks();
                renderTasks();
            });

            const div = document.createElement("div");
            div.appendChild(tickBtn);
            div.appendChild(delBtn);

            li.appendChild(span);
            li.appendChild(div);

            list.appendChild(li);
        });
    }

    function addTask(){
        const input = document.getElementById("taskInput");
        const text = input.value.trim();

        if(text === "") return;

        tasks.push({ text: text, completed: false });
        saveTasks();
        renderTasks();

        input.value = "";
    }

    renderTasks();

</script>

</body>
</html>
