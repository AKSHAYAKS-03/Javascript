<!-- 2. **Simple Calculator**
    - **Objective:** Build a basic calculator that performs arithmetic operations like addition, subtraction, multiplication, and division.
    - **Requirements:**
        - Create number and operator buttons in HTML.
        - Use JavaScript to capture user input and perform calculations.
        - Update the display dynamically as the user interacts with the calculator. -->

<!DOCTYPE html>
<html>
    <head>

        <title>Calculator</title>
        <style>
            body{
                margin: 0;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                height: 100vh;
                color:#fff;
                background-color: #75899e;
            }
            .container{
                text-align: center;
                background-color: #ececec;
                padding: 20px;
                border-radius: 5px;
                box-shadow: 5px 5px 20px 20px rgba(0, 0, 0, 0.1);                
            }
            button{
                margin: 5px;
                padding : 10px 20px;
            }
            input{
                margin: 5px;
                width: 90%;
                height: 20px;
                border-radius: 5px;
            }
            button:hover{
                background-color: #e0e0e0;
                cursor: pointer;
            }
           
        </style>

    </head>
    <body>
        <h1>Calculator</h1>
        <div class="container">
            <input type="text" id="input" readonly>
            <table>
                <tr>
                    <td>
                        <button onclick="appendNumber(1)">1</button>
                        <button onclick="appendNumber(2)">2</button>
                        <button onclick="appendNumber(3)">3</button>
                        <button onclick="appendOperator('+')">+</button>

                        
                    </td>
                </tr>
                <tr>
                    <td>
                        <button onclick="appendNumber(4)">4</button>

                        <button onclick="appendNumber(5)">5</button>
                        <button onclick="appendNumber(6)">6</button>
                        <button onclick="appendOperator('-')">-</button>

                    </td>
                </tr>
                <tr>                            
                    <td>
                        <button onclick="appendNumber(7)">7</button>
                        <button onclick="appendNumber(8)">8</button>
                        <button onclick="appendNumber(9)">9</button>
                        <button onclick="appendOperator('*')">*</button>

                    </td>
                </tr>
                <tr>
                    <td>
                        <button onclick="appendNumber(0)">0</button>
                        <button onclick="appendOperator('/')">/</button>
                        <button onclick="calculate()">=</button>
                        <button onclick="deleteno()">X</button>

                    </td>
                </tr>
             
            </table>

    <script>
        function appendNumber(number) {
            document.getElementById("input").value +=number;
        }


        function appendOperator(opr) {
            document.getElementById("input").value +=opr;
        }
        function deleteno() {
            document.getElementById("input").value = "";
        }
        function calculate(){
            try{
             document.getElementById("input").value = eval(document.getElementById("input").value);
            }
            catch{
                document.getElementById("input").value = "Error";
            }
        }
        

        
    </script>
    </body>
</html>
