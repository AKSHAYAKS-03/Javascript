<!-- 6. **Drag and Drop List Reordering**
    - **Objective:** Implement a list that allows users to reorder items using drag and drop functionality.
    - **Requirements:**
        - Leverage the HTML5 Drag and Drop API to manage drag events.
        - Update the DOM to reflect the new order of items after a drop.
        - Provide visual feedback during drag operations (e.g., highlight potential drop targets). -->

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Drag & Drop List</title>
  <style>
    body { 
        font-family: sans-serif; 
        display: flex; 
        justify-content: center; 
        padding: 40px;
    }
    ul { 
        list-style: none;
         padding: 0;
          width: 300px;
     }
    li {
      padding: 12px 16px;
      margin: 6px 0;
      background: #f0f0f0;
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: grab;
    }
    li.dragging  {
         opacity: 0.4;
         }
    li.drag-over { 
        border-color: #4a90e2; 
        background: #e8f0fe;
     }
  </style>
    </head>
    <body>

    <ul id="list">
    <li draggable="true">Apple</li>
    <li draggable="true">Banana</li>
    <li draggable="true">Grapes</li>
    <li draggable="true">Orange</li>
    <li draggable="true">Strawberry</li>
    </ul>

    <script>
    let dragSrc = null;
    const list = document.getElementById('list');

    function getItems() {       
        return Array.from(list.children);
    }

    list.addEventListener('dragstart', function(e) {
    dragSrc = e.target;
    e.target.classList.add('dragging');
    });

    list.addEventListener('dragend', function(e) {
    e.target.classList.remove('dragging');

    getItems().forEach(function(li) {
        li.classList.remove("drag-over");
    });
    });

    list.addEventListener('dragover', function(e) {
    e.preventDefault();

    const target = e.target.closest('li');

    if (target && target !== dragSrc) {
        getItems().forEach(function(li) {
        li.classList.remove("drag-over");
        });

        target.classList.add('drag-over');
    }
    });

    list.addEventListener('drop', function(e) {
    e.preventDefault();

    const target = e.target.closest('li');

    if (target && target !== dragSrc) {
        let items = getItems();

        let srcIdx = items.indexOf(dragSrc);
        let dstIdx = items.indexOf(target);

        list.insertBefore(dragSrc, srcIdx < dstIdx ? target.nextSibling : target);
    }
    });
    </script>

</body>
</html>
