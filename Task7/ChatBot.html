<!-- 7. **Real-time Chat Simulation**
    - **Objective:** Develop a chat interface that simulates real-time messaging without a backend.
    - **Requirements:**
        - Create a chat window that displays messages as they are sent.
        - Use `setTimeout` or `setInterval` to simulate incoming messages.
        - Handle user input, display timestamps, and update the conversation dynamically. -->
<!DOCTYPE html>
<html>
<head>
  <title>Simple Chat</title>
  <style>
    body { 
        padding: 20px;
        background-color: rgb(215, 215, 215);
        display: flex;
        flex-direction: column;
        align-items: center;
     }

    #chat {
      width: 300px;
      height: 300px;
      overflow-y: auto;
      padding: 50px;
      margin-bottom: 10px;
      background-color: rgb(235, 235, 235);
      border-radius: 10px;
      box-shadow: 0px 0px 20px 10px rgb(151, 151, 151);
    }
    
    #inp{
        display: flex;
        flex-direction: row;
        align-items: center;
        margin: 10px;
        gap:20px;
    }
    #inp input{
        width: 200px;
        padding: 10px;
        border-radius: 10px;
        border: none;
        box-shadow: 0px 0px 10px 5px rgb(151, 151, 151);
    }
    #inp button{
        padding: 10px;
        border-radius: 10px;
        border: none;
        box-shadow: 0px 0px 10px 5px rgb(151, 151, 151);
        cursor: pointer;
    }

    .msg {
      margin: 5px 0;
    }

    .user {
         color: rgb(0, 0, 0); 
        }
    .bot { 
        color: rgb(0, 98, 255); 
    }
  </style>
</head>

<body>

<h3>Chat</h3>

<div id="chat"></div>
<div id="inp">
    <input type="text" id="input" placeholder="Type message">
    <button onclick="sendMsg()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");

function getTime() {
  let d = new Date();

  let h = d.getHours();
  let m = d.getMinutes();

    let ampm = "AM";

    if (h >= 12) {
        ampm = "PM";
    }

    if (h > 12) {
        h = h - 12;
    }

    if (h === 0) {
        h = 12;
    }

    if (m < 10) {
        m = "0" + m;
    }

    return h + ":" + m + " " + ampm;
}

function addMsg(text, type) {
  let div = document.createElement("div");

  div.className = type;
  div.innerText = text + " " + getTime();

  chat.appendChild(div);
}

function sendMsg() {
  let input = document.getElementById("input");
  let text = input.value;

  if (text == "") return;

  addMsg(text, "user");

  input.value = "";

  setTimeout(function() {
    addMsg("Reply: " + text, "bot");
  }, 1000);
}
</script>

</body>
</html>
