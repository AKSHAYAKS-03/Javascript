<!-- 9. **Infinite Scrolling Content Loader**
    - **Objective:** Create a web page that loads additional content as the user scrolls toward the bottom.
    - **Requirements:**
        - Detect when the user is near the bottom of the page using the scroll event.
        - Use the Fetch API to load more data asynchronously (simulate with dummy data or an API).
        - Append new content to the page while ensuring smooth performance and user experience. -->

<!DOCTYPE html>
<html>
<head>
  <title>Infinite Scroll API</title>
  <style>
    body {
        padding: 20px;
     }
    .box { 
        padding: 15px;
         margin: 10px 0; 
         background: lightgray;
     }
    </style>
</head>

<body>

    <h2>Infinite Scroll</h2>
    <div id="content"></div>

    <script>
    const content = document.getElementById("content");

    let page = 1;

    // fetch data from API
    function loadData() {

    fetch(`https://jsonplaceholder.typicode.com/posts?_limit=10&_page=${page}`)
        .then(res => res.json())
        .then(data => {

        data.forEach(item => {
            let div = document.createElement("div");
            div.className = "box";
            div.innerHTML = `<b>ID:</b> ${item.id} <br><b>${item.title}</b><p>${item.body}</p>`;
            content.appendChild(div);
        });

        page++; 
        });
    }

    loadData();

    window.addEventListener("scroll", function() {

    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 10) {
        //screenheight verticalscroll = totalheight
        loadData();

    }

    });
    </script>

</body>
</html>
